<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GitHub Issues Tracker</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body>
        <main class="w-screen min-h-screen bg-[#F8FAFC]">
            <header
                class="navbar bg-base-100 shadow-sm md:px-15 px-5 py-4 sticky top-0 left-0 right-0 z-10 md:flex-row flex-col gap-2"
            >
                <div class="w-full">
                    <a class="text-xl flex items-center" href="#">
                        <img
                            src="./assets/github-logo.png"
                            alt="GitHub Logo"
                            class="md:size-10 size-5 mr-2"
                        />
                        <h3 class="font-medium md:text-2xl text-lg">
                            GitHub Issues Tracker
                        </h3>
                    </a>
                </div>
                <div
                    class="flex items-center justify-between md:min-w-100 w-full"
                >
                    <input
                        type="text"
                        class="input input-bordered w-full"
                        placeholder="Search issues..."
                        id="searchInput"
                    />
                    <button id="searchBtn" class="btn btn-primary ml-2">
                        Search
                    </button>
                </div>
            </header>

            <section class="container mx-auto p-5">
                <!-- TAB MENU -->
                <div
                    class="card w-full md:mt-10 mt-5 bg-base-100 card-xs shadow-sm"
                >
                    <div
                        class="card-body flex flex-row items-center gap-2 md:p-5 p-3 w-full"
                    >
                        <button class="btn btn-primary md:px-10">All</button>
                        <button
                            class="btn btn-ghost md:px-10 border border-gray-200"
                        >
                            Open
                        </button>
                        <button
                            class="btn btn-ghost md:px-10 border border-gray-200"
                        >
                            Closed
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
