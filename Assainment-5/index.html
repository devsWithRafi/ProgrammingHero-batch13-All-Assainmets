<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GitHub Issues Tracker</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body>
        <main class="w-screen min-h-screen bg-[#F8FAFC]">
            <header class="navbar bg-base-100 shadow-sm px-15 py-4">
                <div class="flex-1">
                    <a class="text-xl flex items-center gap-1" href="#">
                        <img
                            src="./assets/github-logo.png"
                            alt="GitHub Logo"
                            class="size-10 mr-2"
                        />
                        <h3 class="font-medium text-2xl">
                            GitHub Issues Tracker
                        </h3>
                    </a>
                </div>
                <div class="flex items-center gap-2 w-100">
                    <input
                        type="text"
                        class="input input-bordered w-full max-w-100"
                        placeholder="Search issues..."
                        id="searchInput"
                    />
                    <button id="searchBtn" class="btn btn-primary ml-2">
                        Search
                    </button>
                </div>
            </header>
        </main>
    </body>
</html>
