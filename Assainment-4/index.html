<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Job Application Tracker</title>
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body>
        <main class="container mx-auto scroll-m-0 p-5 sm:p-0">
            <!-- HEADER PART -->
            <header class="py-7 sm:mt-10 border-b border-gray-700">
                <h1 class="sm:text-4xl text-xl font-bold">Job Application Tracker</h1>

                <figure class="grid sm:grid-cols-3 grid-cols-2 w-full gap-5 mt-5">
                    <div class="card w-full bg-base-300 card-xs shadow-sm sm:p-4 p-2 border border-gray-700">
                        <div class="card-body">
                            <h2 class="card-title sm:text-lg text-sm font-semibold text-gray-400">
                                Total
                            </h2>
                            <p id="totalJobs" class="font-bold sm:text-3xl text-xl">0</p>
                        </div>
                    </div>
                    <div class="card w-full bg-base-300 card-xs shadow-sm sm:p-4 p-2 border border-gray-700">
                        <div class="card-body">
                            <h2 class="card-title sm:text-lg text-sm font-semibold text-gray-400">
                                Interview
                            </h2>
                            <p id="totalInterview" class="font-bold sm:text-3xl text-xl text-green-400">0</p>
                        </div>
                    </div>
                    <div class="card sm:col-span-1 col-span-2 w-full bg-base-300 card-xs shadow-sm sm:p-4 p-2 border border-gray-700">
                        <div class="card-body">
                            <h2 class="card-title sm:text-lg text-sm font-semibold text-gray-400">
                                Rejected
                            </h2>
                            <p id="totalRejected" class="font-bold sm:text-3xl text-xl text-red-400">0</p>
                        </div>
                    </div>
                </figure>
            </header>

            <!-- AVAILABLE JOBS PART -->
            <section class="py-6 pb-20">
                <!-- TOP NAVIGATION PART -->
                <div class="py-2">
                    <div class="mb-4 flex items-center justify-between w-full">
                        <h1 class="font-bold sm:text-3xl text-xl">Available Jobs</h1>
                        <span id="availableJob" class="font-semibold sm:text-xl text-md text-gray-300">0 Jobs</span>
                    </div>
                    <div class="flex items-center gap-3 flex-wrap">
                        <button data-value="all" class="tabButton btn px-7 border-gray-700">All</button>
                        <button data-value="interview" class="tabButton btn px-7 border-gray-700">Interview</button>
                        <button data-value="rejected" class="tabButton btn px-7 border-gray-700">Rejected</button>
                    </div>
                </div>

                <!-- BOTTOM PART - ALL JOB CONTAINER -->
                <div id="jobCardContainer" class="w-full mt-5 flex flex-col gap-5"></div>
                <!-- EMPTY CONTAINER -->
                <div id="emptyContainer" class="card bg-base-300 items-center justify-center sm:h-100 h-80 border-dashed gap-4 shadow-md bg-base-100 w-full overflow-hidden border border-gray-700">
                    <i class="fa-regular fa-file-lines sm:text-7xl text-5xl text-gray-500"></i>
                    <h1 class="font-semibold sm:text-2xl text-xl">No jobs available</h1>
                    <p class="text-gray-400 sm:text-[15px] text-sm">Check back soon for new job opportunities</p>
                </div>
            </section>
        </main>
        <!-- SCRIPT FILES -->
        <script src="scripts/jobData.js"></script>
        <script src="scripts/reuse.js"></script>
        <script src="scripts/script.js"></script>
    </body>
</html>
